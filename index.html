<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주경간교 모델</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }

        #toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 52px;
            background: rgba(16, 16, 40, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 24px; display: flex; align-items: center; gap: 12px;
        }
        #toolbar h1 { font-size: 18px; font-weight: 700; color: #7ec8e3; margin-right: 20px; white-space: nowrap; }
        #toolbar button {
            appearance: none; cursor: pointer;
            background: rgba(59, 130, 246, 0.2); color: #7ec8e3;
            border: 1px solid rgba(126, 200, 227, 0.4); border-radius: 6px;
            padding: 6px 12px; font-size: 12px; font-weight: 600;
        }
        #toolbar button:hover { background: rgba(59, 130, 246, 0.35); }

        #viewer { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }

        #loading {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(10, 10, 30, 0.92); display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.4s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(126,200,227,0.2); border-top-color: #7ec8e3; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 16px; font-size: 14px; color: #7ec8e3; }

        #info-panel {
            position: fixed; bottom: 20px; left: 20px; z-index: 100;
            background: rgba(16,16,40,0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px 20px; font-size: 12px; line-height: 1.8; color: #aaa;
        }
        #info-panel strong { color: #7ec8e3; }

        /* CSS2D 오버레이 라벨 스타일 */
        .site-label { pointer-events: none; text-align: center; }
        .site-label-card {
            background: rgba(0, 30, 60, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 8px;
            padding: 6px 12px;
            backdrop-filter: blur(6px);
            white-space: nowrap;
        }
        .site-label-name { font-size: 10px; color: #93c5fd; font-weight: 700; margin-bottom: 2px; }
        .site-label-workers {
            font-size: 16px; font-weight: 900; color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .site-label-workers svg { width: 14px; height: 14px; fill: #60a5fa; }

        /* 작업자 아이콘 */
        .worker-icon { pointer-events: none; text-align: center; }
        .worker-icon svg { width: 44px; height: 44px; filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.6)); }

        /* 공정률 바 */
        .progress-label { pointer-events: none; text-align: center; }
        .progress-bar-container {
            background: rgba(0, 10, 30, 0.9);
            border: 1px solid #00AEEF;
            border-radius: 6px;
            padding: 5px 10px;
            white-space: nowrap;
            min-width: 120px;
        }
        .progress-bar-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .progress-bar-title span:first-child { font-size: 10px; color: #cbd5e1; font-weight: 600; }
        .progress-bar-title span:last-child { font-size: 12px; color: #00FFFF; font-weight: 900; }
        .progress-bar-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #00FFFF; border-radius: 2px; box-shadow: 0 0 6px #00FFFF; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h1>주경간교 모델</h1>
        <button id="dump-view-btn" title="현재 카메라 좌표를 콘솔에 출력">📍 현재 뷰 좌표</button>
        <button id="view-1-btn" title="프리셋 뷰 1로 이동">🎥 뷰 1</button>
    </div>
    <div id="viewer"></div>
    <div id="loading" class="hidden"><div class="spinner"></div><p id="loading-text">로딩 중...</p></div>
    <div id="info-panel">
        <div><strong>회전:</strong> 좌클릭 드래그 &nbsp; <strong>이동:</strong> 우클릭 드래그 &nbsp; <strong>줌:</strong> 스크롤 &nbsp; <strong>초기화:</strong> Space</div>
        <div id="model-info"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        let scene, camera, renderer, css2dRenderer, controls, currentModel, clock;
        let initialCameraPos, initialTarget;
        let css2dObjects = [];  // 거리 기반 스케일링용
        let pulseRings = [];    // 3D 펄스 링 애니메이션용
        let baseCameraDist = 1; // 초기 카메라 거리

        const SECTIONS = [
            { name: '토공(시점)', workers: 18, progress: 85, color: '#3b82f6', status: 'mid' },
            { name: '접속교(시점)', workers: 24, progress: 62, color: '#3b82f6', status: 'mid' },
            { name: '주탑구간', workers: 54, progress: 45, color: '#ef4444', status: 'high' },
            { name: '접속교(종점)', workers: 32, progress: 58, color: '#3b82f6', status: 'mid' },
            { name: '토공(종점)', workers: 14, progress: 90, color: '#10b981', status: 'low' },
            // ── 좌측/우측 접속교 오버레이 ──
            { name: '좌측 접속교', workers: 12, progress: 70, color: '#3b82f6', status: 'mid' },
            { name: '우측 접속교', workers: 10, progress: 75, color: '#10b981', status: 'low' }
        ];

        const statusConfig = {
            high: { label: '혼잡', color: '#ef4444' },
            mid:  { label: '주의', color: '#3b82f6' },
            low:  { label: '안전', color: '#10b981' }
        };

        function init() {
            const container = document.getElementById('viewer');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.01, 100000);
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            css2dRenderer = new CSS2DRenderer();
            css2dRenderer.setSize(container.clientWidth, container.clientHeight);
            css2dRenderer.domElement.style.position = 'absolute';
            css2dRenderer.domElement.style.top = '0';
            css2dRenderer.domElement.style.left = '0';
            css2dRenderer.domElement.style.pointerEvents = 'none';
            container.appendChild(css2dRenderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            const dirLight2 = new THREE.DirectionalLight(0x8899bb, 0.5);
            dirLight2.position.set(-10, 10, -10);
            scene.add(dirLight2);

            clock = new THREE.Clock();
            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') { e.preventDefault(); resetCamera(); }
            });
            animate();
            loadModel();

            // 카메라 트윈 이동
            window.tweenCameraTo = function(targetPos, targetLook, duration = 800) {
                const startPos = camera.position.clone();
                const startLook = controls.target.clone();
                const endPos = new THREE.Vector3(...targetPos);
                const endLook = new THREE.Vector3(...targetLook);
                const t0 = performance.now();
                function step() {
                    const t = Math.min((performance.now() - t0) / duration, 1);
                    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad
                    camera.position.lerpVectors(startPos, endPos, e);
                    controls.target.lerpVectors(startLook, endLook, e);
                    controls.update();
                    if (t < 1) requestAnimationFrame(step);
                }
                step();
            };

            // 프리셋 뷰 1
            document.getElementById('view-1-btn').addEventListener('click', () => {
                window.tweenCameraTo(
                    [98.539, 6.748, -156.377],
                    [-0.071, 26.654, -23.557]
                );
            });

            // 디버그: 현재 뷰 좌표 콘솔 출력 버튼
            document.getElementById('dump-view-btn').addEventListener('click', () => {
                const dist = camera.position.distanceTo(controls.target);
                const v = {
                    pos: camera.position.toArray().map(n => +n.toFixed(3)),
                    target: controls.target.toArray().map(n => +n.toFixed(3)),
                    distance: +dist.toFixed(3)
                };
                console.log('[VIEW]', JSON.stringify(v));
            });
        }

        function showLoading(text) {
            document.getElementById('loading-text').textContent = text || '로딩 중...';
            document.getElementById('loading').classList.remove('hidden');
        }
        function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

        function fitCameraToModel(object) {
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim === 0) return;

            const fov = camera.fov * (Math.PI / 180);
            let dist = (maxDim / 2) / Math.tan(fov / 2) * 0.8;
            dist = Math.max(dist, 1);

            camera.position.set(center.x + dist * 0.6, center.y + dist * 0.5, center.z + dist * 0.6);
            camera.near = dist * 0.001;
            camera.far = dist * 100;
            camera.updateProjectionMatrix();
            controls.target.copy(center);
            controls.update();

            initialCameraPos = camera.position.clone();
            initialTarget = center.clone();
            baseCameraDist = camera.position.distanceTo(controls.target);
        }

        function resetCamera() {
            if (!initialCameraPos || !initialTarget) return;
            camera.position.copy(initialCameraPos);
            controls.target.copy(initialTarget);
            controls.update();
        }

        function createWorkerSvg() {
            return `<svg width="20" height="20" viewBox="0 0 24 24" fill="#60a5fa" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="7" r="4"/>
                <path d="M12 13c-4.42 0-8 1.79-8 4v2h16v-2c0-2.21-3.58-4-8-4z"/>
            </svg>`;
        }

        // 3D 펄스 링 생성 (바닥에 납작하게)
        function createPulseRing(x, y, z, color) {
            const rings = [];
            for (let i = 0; i < 3; i++) {
                const geom = new THREE.RingGeometry(0.5, 1.5, 32);
                const mat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(color),
                    transparent: true,
                    opacity: 1.0,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.rotation.x = -Math.PI / 2;  // 바닥에 납작하게
                mesh.position.set(x, y, z);
                scene.add(mesh);
                rings.push({ mesh, mat, delay: i * 0.8, time: i * 0.8 });
            }
            return rings;
        }

        function addOverlays(model) {
            const box = new THREE.Box3().setFromObject(model);
            const min = box.min;
            const sz = box.getSize(new THREE.Vector3());
            const REF_DIM = 230; // 원본 bridge.glb 기준 크기
            window._labelSizeScale = Math.min(1, REF_DIM / Math.max(sz.x, sz.z));

            const DECK_Y = 12;

            const deckPositions = [
                { x:  75, y: DECK_Y, z: -115 },
                { x:  38, y: DECK_Y, z:  -62 },
                { x:   1, y: DECK_Y, z:  -14 },
                { x: -36, y: DECK_Y, z:   34 },
                { x: -72, y: DECK_Y, z:   82 },
                // ── 좌측/우측 접속교 오버레이 위치 ──
                { x: 160, y: 8, z: -270 },   // ← 좌측 접속교 오버레이 위치 조정
                { x: -150, y: 9, z:  200 },   // ← 우측 접속교 오버레이 위치 조정
            ];

            SECTIONS.forEach((section, i) => {
                const dp = deckPositions[i];
                const px = dp.x;
                const pz = dp.z;
                const deckY = dp.y;
                const st = statusConfig[section.status];

                // ── 3D 펄스 링 (바닥에 납작하게 고정) ──
                const rings = createPulseRing(px, deckY + 0.5, pz, st.color);
                pulseRings.push(...rings);

                // CSS2DObject 생성 헬퍼: outer(CSS2DRenderer용) > inner(스케일링용)
                function makeCSS2D(innerHTML, x, y, z) {
                    const outer = document.createElement('div');
                    const inner = document.createElement('div');
                    inner.innerHTML = innerHTML;
                    outer.appendChild(inner);
                    const obj = new CSS2DObject(outer);
                    obj.position.set(x, y, z);
                    scene.add(obj);
                    css2dObjects.push(inner);
                    return obj;
                }

                // ── 작업자 아이콘들 ──
                const workerCount = Math.min(Math.ceil(section.workers / 10), 4);
                for (let w = 0; w < workerCount; w++) {
                    const offset = (w - (workerCount - 1) / 2) * 3;
                    makeCSS2D(
                        `<div class="worker-icon">${createWorkerSvg()}</div>`,
                        px + offset, deckY + 5, pz + offset * 0.5
                    );
                }

                // ── 작업자 수 라벨 ──
                makeCSS2D(`
                    <div class="site-label">
                        <div class="site-label-card">
                            <div class="site-label-name">${section.name}</div>
                            <div class="site-label-workers">
                                ${createWorkerSvg()} <span>${section.workers}명</span>
                            </div>
                        </div>
                    </div>`,
                    px, deckY + 21, pz
                );

                // ── 공정률 바 ──
                makeCSS2D(`
                    <div class="progress-label">
                        <div class="progress-bar-container">
                            <div class="progress-bar-title">
                                <span>${section.name}</span>
                                <span>${section.progress}%</span>
                            </div>
                            <div class="progress-bar-track">
                                <div class="progress-bar-fill" style="width: ${section.progress}%"></div>
                            </div>
                        </div>
                    </div>`,
                    px, deckY - 25, pz
                );
            });
        }

        async function loadModel() {
            showLoading('교량 모델 로딩 중...');
            try {
                const group = new THREE.Group();

                // ── 좌측 접속교 ──
                try {
                    const left = await loadGLB('bridge_left_cut.glb');
                    left.position.set(65, 0, -100);   // ← 좌측 모델 위치 조정
                    group.add(left);
                } catch (e) { console.warn('좌측 로드 실패:', e); }

                // ── 메인 교량 (위치 고정) ──
                try {
                    const main = await loadGLB('bridge.glb');
                    group.add(main);
                } catch (e) { console.warn('메인 로드 실패:', e); }

                // ── 우측 접속교 ──
                try {
                    const right = await loadGLB('bridge_right_cut.glb');
                    right.position.set(-130, 0, 200);   // ← 우측 모델 위치 조정
                    group.add(right);
                } catch (e) { console.warn('우측 로드 실패:', e); }

                scene.add(group);
                const object = group;
                currentModel = object;
                fitCameraToModel(object);
                addOverlays(object);

                const box = new THREE.Box3().setFromObject(object);
                const size = box.getSize(new THREE.Vector3());
                let meshCount = 0, vertexCount = 0;
                object.traverse(child => {
                    if (child.isMesh) {
                        meshCount++;
                        if (child.geometry) vertexCount += child.geometry.attributes.position?.count || 0;
                    }
                });
                document.getElementById('model-info').innerHTML =
                    `<strong>메시:</strong> ${meshCount.toLocaleString()} &nbsp; ` +
                    `<strong>정점:</strong> ${vertexCount.toLocaleString()} &nbsp; ` +
                    `<strong>크기:</strong> ${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)}`;
            } catch (err) {
                console.error('모델 로드 실패:', err);
                document.getElementById('model-info').innerHTML =
                    `<span style="color:#ef4444"><strong>로드 실패:</strong> ${err.message}</span>`;
            } finally {
                hideLoading();
            }
        }

        function loadGLB(url) {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);
            return new Promise((resolve, reject) => {
                loader.load(url, (gltf) => { resolve(gltf.scene); }, undefined, reject);
            });
        }

        function onResize() {
            const container = document.getElementById('viewer');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            css2dRenderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsed = clock.elapsedTime;
            controls.update();

            // CSS2D 거리 기반 스케일링 — inner div에 적용 (CSS2DRenderer의 translate 안 건드림)
            if (baseCameraDist > 0) {
                const currentDist = camera.position.distanceTo(controls.target);
                const scale = (baseCameraDist / currentDist) * (window._labelSizeScale || 1);
                css2dObjects.forEach(inner => {
                    inner.style.transform = `scale(${scale})`;
                    inner.style.transformOrigin = 'center center';
                });
            }

            // 3D 펄스 링 애니메이션
            const cycleDuration = 2.5;
            pulseRings.forEach(ring => {
                ring.time += delta;
                const t = ((ring.time) % cycleDuration) / cycleDuration;
                const s = 1 + t * 12;
                ring.mesh.scale.set(s, s, s);
                ring.mat.opacity = (1 - t) * 1.0;
            });

            renderer.render(scene, camera);
            css2dRenderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
