<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주경간교 모델</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }

        #toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 52px;
            background: rgba(16, 16, 40, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 24px; display: flex; align-items: center; gap: 12px;
        }
        #toolbar h1 { font-size: 18px; font-weight: 700; color: #7ec8e3; margin-right: 20px; white-space: nowrap; }

        #viewer { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }

        #loading {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(10, 10, 30, 0.92); display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.4s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(126,200,227,0.2); border-top-color: #7ec8e3; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { margin-top: 16px; font-size: 14px; color: #7ec8e3; }

        #info-panel {
            position: fixed; bottom: 20px; left: 20px; z-index: 100;
            background: rgba(16,16,40,0.9); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px 20px; font-size: 12px; line-height: 1.8; color: #aaa;
        }
        #info-panel strong { color: #7ec8e3; }
    </style>
</head>
<body>
    <div id="toolbar">
        <h1>주경간교 모델</h1>
    </div>
    <div id="viewer"></div>
    <div id="loading" class="hidden"><div class="spinner"></div><p id="loading-text">로딩 중...</p></div>
    <div id="info-panel">
        <div><strong>회전:</strong> 좌클릭 드래그 &nbsp; <strong>이동:</strong> 우클릭 드래그 &nbsp; <strong>줌:</strong> 스크롤 &nbsp; <strong>초기화:</strong> Space</div>
        <div id="model-info"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        let scene, camera, renderer, controls, currentModel, clock;
        let initialCameraPos, initialTarget;

        function init() {
            const container = document.getElementById('viewer');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.01, 100000);
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            const dirLight2 = new THREE.DirectionalLight(0x8899bb, 0.5);
            dirLight2.position.set(-10, 10, -10);
            scene.add(dirLight2);

            clock = new THREE.Clock();
            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    resetCamera();
                }
            });
            animate();
            loadModel();
        }

        function showLoading(text) {
            document.getElementById('loading-text').textContent = text || '로딩 중...';
            document.getElementById('loading').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        function fitCameraToModel(object) {
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim === 0) return;

            const fov = camera.fov * (Math.PI / 180);
            let dist = (maxDim / 2) / Math.tan(fov / 2) * 0.8;
            dist = Math.max(dist, 1);

            camera.position.set(center.x + dist * 0.6, center.y + dist * 0.5, center.z + dist * 0.6);
            camera.near = dist * 0.001;
            camera.far = dist * 100;
            camera.updateProjectionMatrix();
            controls.target.copy(center);
            controls.update();

            // 초기 상태 저장
            initialCameraPos = camera.position.clone();
            initialTarget = center.clone();

        }

        function resetCamera() {
            if (!initialCameraPos || !initialTarget) return;
            camera.position.copy(initialCameraPos);
            controls.target.copy(initialTarget);
            controls.update();
        }

        async function loadModel() {
            showLoading('교량 모델 로딩 중...');

            try {
                const object = await loadGLB('bridge.glb');
                scene.add(object);
                currentModel = object;
                fitCameraToModel(object);

                const box = new THREE.Box3().setFromObject(object);
                const size = box.getSize(new THREE.Vector3());
                let meshCount = 0, vertexCount = 0;
                object.traverse(child => {
                    if (child.isMesh) {
                        meshCount++;
                        if (child.geometry) vertexCount += child.geometry.attributes.position?.count || 0;
                    }
                });
                document.getElementById('model-info').innerHTML =
                    `<strong>메시:</strong> ${meshCount.toLocaleString()} &nbsp; ` +
                    `<strong>정점:</strong> ${vertexCount.toLocaleString()} &nbsp; ` +
                    `<strong>크기:</strong> ${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)}`;
            } catch (err) {
                console.error('모델 로드 실패:', err);
                document.getElementById('model-info').innerHTML =
                    `<span style="color:#ef4444"><strong>로드 실패:</strong> ${err.message}</span>`;
            } finally {
                hideLoading();
            }
        }

        function loadGLB(url) {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);
            return new Promise((resolve, reject) => {
                loader.load(url, (gltf) => {
                    resolve(gltf.scene);
                }, undefined, reject);
            });
        }

        function onResize() {
            const container = document.getElementById('viewer');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
